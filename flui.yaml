kind: Application
apiVersion: flui/v1

metadata:
  name: my-app

build:
  strategy: dockerfile
  dockerfile: ./Dockerfile

deploy:
  port: 3000
  exposure: public
  healthcheck:
    path: /health
    port: 3000
  resources:
    profile: small
  scaling:
    min: 1
    max: 1
  domain:
    auto: true
    tls: true
    hostnameMode: ip
    certChallenge: http-01
    certificateProvider: lets-encrypt-staging
  env: []
